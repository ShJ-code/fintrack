name: CI
on:
  push:    { branches: ["**"] }
  pull_request: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - working-directory: fintrack-backend
        run: ./mvnw -B verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fintrack-frontend/package-lock.json
      - working-directory: fintrack-frontend
        run: |
          npm ci
          npm run build
          npm run lint